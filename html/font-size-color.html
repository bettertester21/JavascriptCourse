<!DOCTYPE html>
<html>
<body>

<h2>What Can JavaScript Do?</h2>

<p id="demo">JavaScript can change the style of an HTML element.</p>

<button type="button" onclick="document.getElementById('demo').style.fontSize='35px'">To Change Font Size,Click Me!</button>
<button type="button" onclick="document.getElementById('demo').style.color='green'">To Change Text Color,Click Me!</button>


</body>
</html>
